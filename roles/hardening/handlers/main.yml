---
- name: Restart SSH
  ansible.builtin.systemd:
    name: ssh
    state: restarted

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted

- name: Restart Docker
  ansible.builtin.systemd:
    name: docker
    state: restarted

- name: Update initramfs
  ansible.builtin.command: update-initramfs -u
  changed_when: true

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true
