---
- name: Set UFW default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Set UFW default routed policy to deny
  community.general.ufw:
    direction: routed
    policy: deny

- name: Allow all traffic from LAN subnet
  community.general.ufw:
    rule: allow
    from_ip: "{{ lan_subnet }}"
    comment: "LAN trusted subnet"

- name: Enable UFW
  community.general.ufw:
    state: enabled

# srv1 only — Cloudflare IP allowlist for NPM
# IP list lives in group_vars/all/vars.yml (cloudflare_ipv4_ranges)
- name: Allow Cloudflare IPs to port 443
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "443"
    proto: tcp
    comment: "Cloudflare"
  loop: "{{ cloudflare_ipv4_ranges }}"
  when: inventory_hostname == 'srv1'
