---
- name: Set UFW default incoming policy to deny
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set UFW default outgoing policy to allow
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Set UFW default routed policy to deny
  community.general.ufw:
    direction: routed
    policy: deny

- name: Allow all traffic from LAN subnet
  community.general.ufw:
    rule: allow
    from_ip: "{{ lan_subnet }}"
    comment: "LAN trusted subnet"

- name: Enable UFW
  community.general.ufw:
    state: enabled

# srv1 only — Cloudflare IP allowlist for NPM
- name: Allow Cloudflare IPs to port 443
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "443"
    proto: tcp
    comment: "Cloudflare"
  loop:
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 104.16.0.0/13
    - 104.24.0.0/14
    - 108.162.192.0/18
    - 131.0.72.0/22
    - 141.101.64.0/18
    - 162.158.0.0/15
    - 172.64.0.0/13
    - 173.245.48.0/20
    - 188.114.96.0/20
    - 190.93.240.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17
  when: inventory_hostname == 'srv1'
