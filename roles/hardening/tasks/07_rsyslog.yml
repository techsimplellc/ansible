# Repo path: ~/git/ansible/roles/hardening/tasks/07_rsyslog.yml
---
- name: Install rsyslog
  ansible.builtin.apt:
    name: rsyslog
    state: present

- name: Deploy PPF rsyslog hardening config
  ansible.builtin.copy:
    src: 99-ppf-hardening.conf
    dest: /etc/rsyslog.d/99-ppf-hardening.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart rsyslog

- name: Ensure /var/log/sudo.log exists with correct ownership
  ansible.builtin.file:
    path: /var/log/sudo.log
    state: touch
    owner: root
    group: adm
    mode: "0640"
    modification_time: preserve
    access_time: preserve

- name: Ensure /var/log/cron.log exists with correct ownership
  ansible.builtin.file:
    path: /var/log/cron.log
    state: touch
    owner: root
    group: adm
    mode: "0640"
    modification_time: preserve
    access_time: preserve

- name: Set ownership and permissions on /var/log/auth.log
  ansible.builtin.file:
    path: /var/log/auth.log
    owner: root
    group: adm
    mode: "0640"

# Deploy forwarding rule to all hosts except srv6 (the central receiver itself)
# Docs: https://www.rsyslog.com/doc/master/configuration/modules/omfwd.html
- name: Deploy rsyslog forwarding config to srv6
  ansible.builtin.copy:
    src: 10-forward-to-srv6.conf
    dest: /etc/rsyslog.d/10-forward-to-srv6.conf
    owner: root
    group: root
    mode: "0644"
  when: inventory_hostname != 'srv6'
  notify: Restart rsyslog

- name: Remove forwarding config on srv6 (receiver does not forward to itself)
  ansible.builtin.file:
    path: /etc/rsyslog.d/10-forward-to-srv6.conf
    state: absent
  when: inventory_hostname == 'srv6'
  notify: Restart rsyslog

- name: Enable and start rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    enabled: true
    state: started
