# PPF Homelab — Forward all logs to central rsyslog server on srv6
# Deployed by: roles/hardening/tasks/07_rsyslog.yml
# Docs: https://www.rsyslog.com/doc/master/configuration/modules/omfwd.html
#
# Uses TCP for reliable delivery (vs UDP which is fire-and-forget).
# Queue configuration ensures logs are buffered locally if srv6 is
# temporarily unreachable and forwarded when it comes back online.

action(type="omfwd"
       target="192.168.68.16"
       port="514"
       protocol="tcp"
       action.resumeRetryCount="-1"
       queue.type="LinkedList"
       queue.filename="fwd_srv6"
       queue.maxdiskspace="100m"
       queue.saveonshutdown="on")
