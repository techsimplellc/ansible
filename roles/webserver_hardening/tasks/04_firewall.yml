---
# Distro-agnostic firewall configuration.
# Debian family → UFW
# RedHat family → firewalld
# No LAN subnet allow rule — this is a public-facing VPS.
# Port 80 restricted to Cloudflare IP ranges only — prevents bypass of Cloudflare proxy.
# Port 443 not opened — Cloudflare Flexible mode connects to origin on port 80 only.

# ── UFW (Debian/Ubuntu) ───────────────────────────────────────────────────────

- name: Install UFW (Debian)
  ansible.builtin.apt:
    name: ufw
    state: present
  when: ansible_os_family == 'Debian'
  tags: firewall

- name: Set UFW default incoming policy to deny (Debian)
  community.general.ufw:
    direction: incoming
    policy: deny
  when: ansible_os_family == 'Debian'
  tags: firewall

- name: Set UFW default outgoing policy to allow (Debian)
  community.general.ufw:
    direction: outgoing
    policy: allow
  when: ansible_os_family == 'Debian'
  tags: firewall

- name: Allow SSH port {{ ssh_port }}/tcp (Debian/UFW)
  community.general.ufw:
    rule: allow
    to_port: "{{ ssh_port }}"
    proto: tcp
    comment: "SSH"
  when: ansible_os_family == 'Debian'
  tags: firewall

- name: Allow HTTP 80/tcp from Cloudflare IPv4 ranges (Debian/UFW)
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "80"
    proto: tcp
    comment: "Cloudflare HTTP"
  loop: "{{ cloudflare_ipv4_ranges }}"
  when: ansible_os_family == 'Debian'
  tags: firewall

- name: Allow HTTP 80/tcp from Cloudflare IPv6 ranges (Debian/UFW)
  community.general.ufw:
    rule: allow
    from_ip: "{{ item }}"
    to_port: "80"
    proto: tcp
    comment: "Cloudflare HTTP"
  loop: "{{ cloudflare_ipv6_ranges }}"
  when: ansible_os_family == 'Debian'
  tags: firewall

- name: Enable UFW (Debian)
  community.general.ufw:
    state: enabled
  when: ansible_os_family == 'Debian'
  tags: firewall

# ── firewalld (RedHat/Rocky) ──────────────────────────────────────────────────

- name: Install firewalld (RedHat)
  ansible.builtin.dnf:
    name: firewalld
    state: present
  when: ansible_os_family == 'RedHat'
  tags: firewall

- name: Enable and start firewalld (RedHat)
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started
  when: ansible_os_family == 'RedHat'
  tags: firewall

- name: Remove default ssh service from firewalld zone (RedHat)
  ansible.posix.firewalld:
    service: ssh
    zone: public
    permanent: true
    state: disabled
  when: ansible_os_family == 'RedHat'
  tags: firewall

- name: Allow SSH port {{ ssh_port }}/tcp (RedHat/firewalld)
  ansible.posix.firewalld:
    port: "{{ ssh_port }}/tcp"
    zone: public
    permanent: true
    state: enabled
  when: ansible_os_family == 'RedHat'
  tags: firewall

- name: Allow HTTP 80/tcp from Cloudflare IPv4 ranges (RedHat/firewalld)
  ansible.posix.firewalld:
    rich_rule: "rule family='ipv4' source address='{{ item }}' port port='80' protocol='tcp' accept"
    zone: public
    permanent: true
    state: enabled
  loop: "{{ cloudflare_ipv4_ranges }}"
  when: ansible_os_family == 'RedHat'
  tags: firewall

- name: Allow HTTP 80/tcp from Cloudflare IPv6 ranges (RedHat/firewalld)
  ansible.posix.firewalld:
    rich_rule: "rule family='ipv6' source address='{{ item }}' port port='80' protocol='tcp' accept"
    zone: public
    permanent: true
    state: enabled
  loop: "{{ cloudflare_ipv6_ranges }}"
  when: ansible_os_family == 'RedHat'
  tags: firewall

- name: Reload firewalld to apply rules (RedHat)
  ansible.builtin.command: firewall-cmd --reload
  changed_when: true
  when: ansible_os_family == 'RedHat'
  tags: firewall
