---
- name: Restart SSH
  ansible.builtin.service:
    name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
    state: restarted

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Reload fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: reloaded
