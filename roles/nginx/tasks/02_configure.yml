---
- name: Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: nginx_configure

# Validation intentionally omitted here — nginx.conf includes sites-enabled/*
# so nginx -t loads all vhost configs. Vhosts are deployed in 03_vhosts.yml,
# which runs the final nginx -t after everything is in place.
