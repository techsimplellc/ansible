---
# Run once — 2048-bit DH params for Forward Secrecy
- name: Generate DH parameters (2048-bit) if not present
  ansible.builtin.command:
    cmd: openssl dhparam -out /etc/nginx/dhparam.pem 2048
    creates: /etc/nginx/dhparam.pem
  tags: nginx_configure

- name: Deploy hardened nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload nginx
  tags: nginx_configure

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t
  register: nginx_validate
  changed_when: false
  failed_when: nginx_validate.rc != 0
  tags: nginx_configure
