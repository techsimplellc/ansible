---
# =============================================================================
# srv5_stacks.yml — Orchestrator: deploy all stacks to srv5
# Docs:
#   Ollama       : https://hub.docker.com/r/ollama/ollama
#   AnythingLLM  : https://docs.anythingllm.com/installation/self-hosted/docker
#   NVIDIA Docker: https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
#
# This orchestrator imports individual app playbooks. To deploy a single app,
# run its playbook directly (e.g. ansible-playbook playbooks/ollama.yml).
#
# Deploy order matters: ollama must be running before anythingllm starts.
#
# Prerequisites on srv5 (handled by individual playbooks):
#   - NVIDIA Container Toolkit installed
#   - /dev/nvme1n1p1 (UUID: 18081cdc-9742-4142-9ad1-56d8374edd1a) mounted at /mnt/nvme1
#
# Vault requirements:
#   playbooks/vars/anythingllm_vault.yml — anythingllm_jwt_secret
#
# Run all stacks:
#   ansible-playbook playbooks/srv5_stacks.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- import_playbook: ollama.yml
- import_playbook: anythingllm.yml
