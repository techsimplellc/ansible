---
# =============================================================================
# ufw.yml — Install and manage UFW + tufw on homelab servers
#
# Applies the baseline UFW policy on farm and dev hosts:
#   - Default deny incoming / allow outgoing / deny routed
#   - Allow SSH 2222/tcp from LAN
#   - Allow all traffic from LAN subnet
#   - Enable UFW
#   - srv1 only: allow Cloudflare IPv4 ranges to port 443/tcp (NPM)
#   - Install tufw (terminal UI for UFW) — https://github.com/peltho/tufw
#
# Safe to re-run at any time — all tasks are idempotent.
# Cloudflare IP list lives in group_vars/all/vars.yml and is kept current
# by scripts/update_cloudflare_ips.py (run monthly via cron).
#
# Run (all servers):
#   ansible-playbook playbooks/ufw.yml -i inventory.yml \
#     --ask-vault-pass --become
#
# Run (single server):
#   ansible-playbook playbooks/ufw.yml -i inventory.yml \
#     --limit srv1 --ask-vault-pass --become
#
# Tags: ufw, tufw
# =============================================================================

- name: Install and configure UFW and tufw on homelab servers
  hosts: "{{ target | default('farm:dev') }}"
  gather_facts: true
  become: true

  vars_files:
    - vars/app_versions.yml

  vars:
    tufw_deb_url: "https://github.com/peltho/tufw/releases/download/v{{ tufw_version }}/tufw_{{ tufw_version }}_linux_amd64.deb"
    tufw_deb_dest: "/tmp/tufw_{{ tufw_version }}_linux_amd64.deb"

  tasks:
    - name: Install UFW
      ansible.builtin.apt:
        name: ufw
        state: present
      tags: ufw

    - name: Disable IPv6 in UFW
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: '^IPV6='
        line: 'IPV6=no'
      notify: Reload UFW
      tags: ufw

    - name: Set UFW default incoming policy to deny
      community.general.ufw:
        direction: incoming
        policy: deny
      tags: ufw

    - name: Set UFW default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        policy: allow
      tags: ufw

    - name: Set UFW default routed policy to deny
      community.general.ufw:
        direction: routed
        policy: deny
      tags: ufw

    - name: Allow SSH on port 2222 from LAN
      community.general.ufw:
        rule: allow
        from_ip: "{{ lan_subnet }}"
        to_port: "2222"
        proto: tcp
        comment: "SSH LAN only"
      tags: ufw

    - name: Allow all traffic from LAN subnet
      community.general.ufw:
        rule: allow
        from_ip: "{{ lan_subnet }}"
        comment: "LAN trusted subnet"
      tags: ufw

    - name: Enable UFW
      community.general.ufw:
        state: enabled
      tags: ufw

    # srv1 only — Cloudflare IP allowlist for NPM (port 443)
    - name: Allow Cloudflare IPs to port 443
      community.general.ufw:
        rule: allow
        from_ip: "{{ item }}"
        to_port: "443"
        proto: tcp
        comment: "Cloudflare"
      loop: "{{ cloudflare_ipv4_ranges }}"
      when: inventory_hostname == 'srv1'
      tags: ufw

    # ── tufw (terminal UI for UFW) ─────────────────────────────────────────
    - name: Check installed tufw version
      ansible.builtin.command: tufw --version
      register: tufw_installed
      changed_when: false
      failed_when: false
      tags: tufw

    - name: Download tufw .deb
      ansible.builtin.get_url:
        url: "{{ tufw_deb_url }}"
        dest: "{{ tufw_deb_dest }}"
        mode: "0644"
      when: tufw_installed.rc != 0 or tufw_version not in tufw_installed.stdout
      tags: tufw

    - name: Install tufw .deb
      ansible.builtin.apt:
        deb: "{{ tufw_deb_dest }}"
        state: present
      when: tufw_installed.rc != 0 or tufw_version not in tufw_installed.stdout
      tags: tufw

    - name: Remove downloaded .deb
      ansible.builtin.file:
        path: "{{ tufw_deb_dest }}"
        state: absent
      when: tufw_installed.rc != 0 or tufw_version not in tufw_installed.stdout
      tags: tufw

  handlers:
    - name: Reload UFW
      community.general.ufw:
        state: reloaded
