---
# =============================================================================
# setup_letsencrypt.yml — Issue and renew Let's Encrypt certs via DNS-01
# Target group: webservers (e.g. painterprecision.com / 144.202.87.7)
# DNS provider: Cloudflare
# Challenge: DNS-01 (no inbound port 80 dependency)
#
# PREREQUISITES — run these commands ONCE before first deploy:
#
#   1. Create the encrypted vault file:
#        ansible-vault create group_vars/webservers/vault.yml
#
#   2. Inside the editor, add (no vault_ prefix per CLAUDE.md convention):
#        cloudflare_api_token: "your_cloudflare_api_token_here"
#
#   3. Required Cloudflare token permissions:
#        Zone → Zone → Read
#        Zone → DNS → Edit
#        (scope to the specific zone for painterprecision.com)
#
# Run:
#   ansible-playbook playbooks/setup_letsencrypt.yml \
#     -i inventory.yml --limit painterprecision --ask-vault-pass --become
#
# Or with a vault password file:
#   ansible-playbook playbooks/setup_letsencrypt.yml \
#     --vault-password-file ~/.vault_pass
#
# Tag-scoped runs:
#   --tags certbot_install      — install certbot only
#   --tags certbot_credentials  — deploy cloudflare.ini only
#   --tags certbot_issue        — issue/renew certs only
#   --tags certbot_renewal      — configure auto-renewal only
# =============================================================================

- name: Issue Let's Encrypt certificates via Cloudflare DNS-01
  hosts: webservers
  become: true
  gather_facts: true
  vars_files:
    - "{{ playbook_dir }}/../group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../group_vars/webservers/vars.yml"
    - "{{ playbook_dir }}/../group_vars/webservers/vault.yml"

  handlers:
    - name: Reload nginx
      ansible.builtin.service:
        name: nginx
        state: reloaded

  pre_tasks:
    - name: Assert cloudflare_api_token is defined and non-empty
      ansible.builtin.assert:
        that:
          - cloudflare_api_token is defined
          - cloudflare_api_token | length > 0
        fail_msg: >
          cloudflare_api_token is not set.
          Run: ansible-vault edit group_vars/webservers/vault.yml
          and add: cloudflare_api_token: "your_token_here"

  tasks:
    - name: Install certbot and DNS-Cloudflare plugin
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/certbot_install.yml"

    - name: Deploy Cloudflare API credentials
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/certbot_credentials.yml"

    - name: Issue certificates for configured domains
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/certbot_issue.yml"

    - name: Configure automatic certificate renewal
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/certbot_renewal.yml"
