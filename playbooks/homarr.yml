---
# =============================================================================
# homarr.yml — Deploy Homarr dashboard to dev1
# Docs: https://homarr.dev/docs/getting-started/installation
#
# No app-specific vault vars required.
# All configuration is done via the Homarr web UI at http://192.168.68.21:7575
#
# Run:
#   ansible-playbook playbooks/homarr.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Deploy Homarr dashboard to dev1
  hosts: dev1
  become: true
  gather_facts: true

  vars_files:
    - vars/app_versions.yml

  vars:
    stacks_root: /opt/stacks
    docker_network: proxy

  pre_tasks:
    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

    - name: Ensure shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

    - name: Ensure Homarr data directories exist
      ansible.builtin.file:
        path: "{{ stacks_root }}/homarr/{{ item }}"
        state: directory
        owner: root
        group: docker-admin
        mode: "0775"
      loop:
        - configs
        - icons
        - data

  tasks:
    - name: Deploy homarr stack
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/deploy_stack.yml"
      vars:
        stack_name: homarr
