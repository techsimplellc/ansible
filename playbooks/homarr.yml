---
# =============================================================================
# homarr.yml — Deploy Homarr dashboard to dev1
# Docs: https://homarr.dev/docs/getting-started/installation/docker/
#
# Vault: playbooks/vars/homarr_vault.yml
#   homarr_secret_key: encryption key (openssl rand -hex 32)
#
# Run:
#   ansible-playbook playbooks/homarr.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Deploy Homarr dashboard to dev1
  hosts: dev1
  become: true
  gather_facts: true

  vars_files:
    - vars/app_versions.yml
    - vars/homarr_vault.yml

  vars:
    stacks_root: /opt/stacks
    docker_network: proxy

  pre_tasks:
    - name: Assert required vault variables are present
      ansible.builtin.assert:
        that:
          - homarr_secret_key is defined and homarr_secret_key | length > 0
        fail_msg: "Missing vault vars — populate and encrypt playbooks/vars/homarr_vault.yml"

    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

    - name: Ensure shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

    - name: Ensure Homarr appdata directory exists
      ansible.builtin.file:
        path: "{{ stacks_root }}/homarr/appdata"
        state: directory
        owner: root
        group: docker-admin
        mode: "0775"

  tasks:
    - name: Deploy homarr stack
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/deploy_stack.yml"
      vars:
        stack_name: homarr
