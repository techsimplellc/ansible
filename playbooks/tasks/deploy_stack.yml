# Repo path: ~/git/ansible/playbooks/tasks/deploy_stack.yml
---
# Reusable task: renders a compose template and runs docker compose up
# Required vars: stack_name
#
# Pull step uses ansible.builtin.command so Docker's layer-by-layer
# pull progress streams through to the terminal in real time.

- name: "{{ stack_name }} | Render docker-compose.yml"
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/{{ stack_name }}/docker-compose.yml.j2"
    dest: "{{ stacks_root }}/{{ stack_name }}/docker-compose.yml"
    owner: root
    group: docker-admin
    mode: "0640"
  register: compose_file

- name: "{{ stack_name }} | Pull latest images"
  ansible.builtin.command:
    cmd: docker compose pull
    chdir: "{{ stacks_root }}/{{ stack_name }}"
  when: compose_file.changed
  register: pull_result
  changed_when: "'Pull complete' in pull_result.stdout or 'Downloaded newer image' in pull_result.stdout"

- name: "{{ stack_name }} | Bring stack up"
  ansible.builtin.command:
    cmd: docker compose up --detach --remove-orphans
    chdir: "{{ stacks_root }}/{{ stack_name }}"
  register: up_result
  changed_when: "'Started' in up_result.stdout or 'Created' in up_result.stdout"
