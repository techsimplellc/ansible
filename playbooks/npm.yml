---
# =============================================================================
# npm.yml — Deploy Nginx Proxy Manager stack to srv1
# Docs: https://nginxproxymanager.com/
#
# No app-specific vault vars required.
#
# Run:
#   ansible-playbook playbooks/npm.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Deploy Nginx Proxy Manager stack to srv1
  hosts: srv1
  become: true
  gather_facts: true

  vars_files:
    - vars/app_versions.yml

  vars:
    stacks_root: /opt/stacks
    docker_network: proxy

  pre_tasks:
    - name: Mount NFS storage from srv6
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/nfs_client.yml"

    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

    - name: Ensure shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

  tasks:
    - name: Deploy npm stack
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/deploy_stack.yml"
      vars:
        stack_name: npm
