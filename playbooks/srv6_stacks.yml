---
# =============================================================================
# srv6_stacks.yml — Orchestrator: deploy all stacks to srv6
# Docs:
#   Paperless-ngx: https://docs.paperless-ngx.com/setup/#docker
#   Authentik    : https://docs.goauthentik.io/docs/install-config/install/docker-compose
#   Simple Office: (internal — custom Node.js/React + OnlyOffice)
#   OmniMail     : https://mail.techsimple.dev
#
# This orchestrator imports individual app playbooks. To deploy a single app,
# run its playbook directly (e.g. ansible-playbook playbooks/paperless.yml).
#
# srv6 is the NFS server — it must be deployed before srv1/3/4/5 stacks.
# Server-level services (rsyslog, cockpit) are handled here before app imports.
#
# Two-pass deployment notes:
#   Paperless-ai/gpt: require Paperless-ngx API token — see paperless.yml header
#   Simple Office   : requires Authentik OIDC config — see simple-office.yml header
#
# Port assignments on srv6:
#   5437 — postgres-paperless
#   5438 — postgres-simple-office
#   5439 — postgres-authentik
#   8086 — paperless-ngx        (NPM upstream)
#   8090 — simple-office-api    (NPM upstream)
#   8091 — simple-office-web    (NPM upstream)
#   8025 — omnimail             (NPM upstream)
#   8092 — onlyoffice-so        (LAN only)
#   9000 — authentik            (NPM upstream)
#
# Vault requirements:
#   playbooks/vars/paperless_vault.yml     — paperless_* vars
#   playbooks/vars/authentik_vault.yml     — authentik_* vars
#   playbooks/vars/simple_office_vault.yml — so_* and onlyoffice_* vars
#   playbooks/vars/omnimail_vault.yml      — omnimail_* vars
#
# Run all stacks:
#   ansible-playbook playbooks/srv6_stacks.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

# ── Server infrastructure (rsyslog + cockpit) ─────────────────────────────────
- name: Configure srv6 server infrastructure
  hosts: srv6
  become: true
  gather_facts: true

  tasks:
    - name: Install and configure rsyslog server
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/rsyslog_server.yml"

    - name: Install and configure Cockpit
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/cockpit.yml"

# ── Application stacks ────────────────────────────────────────────────────────
- import_playbook: paperless.yml
- import_playbook: authentik.yml
- import_playbook: simple-office.yml
- import_playbook: omnimail.yml
