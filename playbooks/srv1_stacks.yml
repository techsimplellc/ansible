---
# =============================================================================
# srv1_stacks.yml — Orchestrator: deploy all stacks to srv1
# Docs:
#   cloudflared : https://developers.cloudflare.com/cloudflare-one/connections/connect-networks/
#   NPM         : https://nginxproxymanager.com/
#   Whoogle     : https://github.com/benbusby/whoogle-search
#   AdGuard Home: https://github.com/AdguardTeam/AdGuardHome
#
# This orchestrator imports individual app playbooks. To deploy a single app,
# run its playbook directly (e.g. ansible-playbook playbooks/cloudflared.yml).
#
# Vault requirements:
#   playbooks/vars/cloudflared_vault.yml  — cloudflared_tunnel_token
#
# Run all stacks:
#   ansible-playbook playbooks/srv1_stacks.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- import_playbook: cloudflared.yml
- import_playbook: npm.yml
- import_playbook: whoogle.yml
- import_playbook: adguardhome.yml
