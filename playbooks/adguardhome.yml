---
# =============================================================================
# adguardhome.yml — Deploy AdGuard Home stack to srv1
# Docs: https://github.com/AdguardTeam/AdGuardHome
#
# No app-specific vault vars required.
# Requires port 53 to be freed from systemd-resolved before deployment.
#
# Run:
#   ansible-playbook playbooks/adguardhome.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Deploy AdGuard Home stack to srv1
  hosts: srv1
  become: true
  gather_facts: true

  vars:
    stacks_root: /opt/stacks
    docker_network: proxy

  pre_tasks:
    - name: Mount NFS storage from srv6
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/nfs_client.yml"

    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

    - name: Ensure shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

    - name: Free port 53 for AdGuard Home
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/free_port53.yml"

  tasks:
    - name: Deploy adguardhome stack
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/deploy_stack.yml"
      vars:
        stack_name: adguardhome
