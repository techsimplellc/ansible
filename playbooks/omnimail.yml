# Repo path: ~/git/ansible/playbooks/omnimail.yml
---
# =============================================================================
# omnimail.yml — Deploy OmniMail webmail client to srv6 (192.168.68.16)
# Docs: https://github.com/techsimplellc/omnimail
#
# OmniMail is a build-from-source project (React + TypeScript + Node.js +
# PostgreSQL + Redis). Unlike most stacks in this repo, it uses
# docker compose up --build instead of pre-built images.
#
# Source sync: the local omnimail repo (sibling of this repo on the control
# machine) is rsynced to srv6 via ansible.posix.synchronize — no internet
# access required on srv6.
#
# srv6 is the NFS server — uses nfs_server.yml (not nfs_client.yml).
#
# External access:
#   Internal : http://192.168.68.16:8025
#   External : https://mail.techsimple.dev
#              Add public hostname in Cloudflare Zero Trust dashboard:
#              Networks → Tunnels → <tunnel> → Public Hostnames
#              Service: http://192.168.68.16:8025
#
# Vault: playbooks/vars/omnimail_vault.yml
#   omnimail_db_password             : database password (openssl rand -hex 24)
#   omnimail_session_secret          : session secret (openssl rand -hex 32)
#   omnimail_encryption_key          : AES-256-GCM key (openssl rand -hex 32)
#   GOOGLE_CLIENT_ID        : Google OAuth client ID (leave unset to disable)
#   GOOGLE_CLIENT_SECRET    : Google OAuth client secret
#   MICROSOFT_CLIENT_ID     : Microsoft OAuth client ID (leave unset to disable)
#   MICROSOFT_CLIENT_SECRET : Microsoft OAuth client secret
#   YAHOO_CLIENT_ID         : Yahoo OAuth client ID (leave unset to disable)
#   YAHOO_CLIENT_SECRET     : Yahoo OAuth client secret
#
# NOTE: Redirect URIs are NOT in the vault — they default to https://mail.techsimple.dev/api/oauth/<provider>/callback
# NOTE: docker-compose.yml on srv6 is rendered from templates/omnimail/docker-compose.yml.j2
#       Do NOT edit docker-compose.yml in the omnimail repo for production config changes.
#
# Run:
#   ansible-playbook playbooks/omnimail.yml -i inventory.yml --ask-vault-pass --become
#
# Tag-scoped re-deploys:
#   --tags build   rebuild and restart the stack only (skip sync/vault checks)
#   --tags deploy  render compose + build + start (skip source sync)
# =============================================================================

- name: Deploy OmniMail to srv6
  hosts: srv6
  become: true
  gather_facts: true

  vars_files:
    - vars/app_versions.yml
    - vars/omnimail_vault.yml

  vars:
    stacks_root: /opt/stacks
    docker_network: proxy
    # Derives the local omnimail path relative to this repo on the control machine:
    # playbook_dir = .../ansible/playbooks → two dirnames up = .../git → + /omnimail
    omnimail_local_path: "{{ playbook_dir | dirname | dirname }}/omnimail"

  pre_tasks:
    - name: Assert required vault variables are present
      ansible.builtin.assert:
        that:
          - omnimail_db_password is defined and omnimail_db_password | length > 0
          - omnimail_session_secret is defined and omnimail_session_secret | length > 0
          - omnimail_encryption_key is defined and omnimail_encryption_key | length > 0
        fail_msg: "Missing vault vars — populate and encrypt playbooks/vars/omnimail_vault.yml"
      tags: always

    - name: Configure NFS server and local /opt/stacks symlink
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/nfs_server.yml"

    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

    - name: Ensure shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

  tasks:
    - name: Sync OmniMail source from control machine to srv6
      ansible.posix.synchronize:
        src: "{{ omnimail_local_path }}/"
        dest: "{{ stacks_root }}/omnimail/"
        delete: true
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=node_modules"
          - "--exclude=.env"
          - "--exclude=frontend/dist"
          - "--exclude=frontend/.vite"
      register: sync_result

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/omnimail/docker-compose.yml.j2"
        dest: "{{ stacks_root }}/omnimail/docker-compose.yml"
        owner: root
        group: docker-admin
        mode: "0640"
      register: compose_file
      tags: deploy

    - name: Build images and start OmniMail stack
      ansible.builtin.command:
        cmd: docker compose up --build --detach --remove-orphans
        chdir: "{{ stacks_root }}/omnimail"
      when: compose_file.changed or sync_result.changed
      register: up_result
      changed_when: "'Started' in up_result.stdout or 'Created' in up_result.stdout"
      tags:
        - deploy
        - build

    - name: Wait for OmniMail to be reachable on port 8025
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 8025
        delay: 10
        timeout: 180
        msg: "Timed out waiting for OmniMail frontend on port 8025"
      tags: deploy
