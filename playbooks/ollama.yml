---
# =============================================================================
# ollama.yml — Deploy Ollama stack to srv5
# Docs: https://hub.docker.com/r/ollama/ollama
#
# Prerequisites handled by this playbook:
#   - NVIDIA Container Toolkit installed
#   - /dev/nvme1n1p1 (UUID: 18081cdc-9742-4142-9ad1-56d8374edd1a) mounted at /mnt/nvme1
#
# No app-specific vault vars required.
# Exposed via cloudflared tunnel through NPM on srv1: http://192.168.68.15:11434
#
# Run:
#   ansible-playbook playbooks/ollama.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Deploy Ollama stack to srv5
  hosts: srv5
  become: true
  gather_facts: true

  vars:
    stacks_root: /opt/stacks
    docker_network: proxy
    models_uuid: "18081cdc-9742-4142-9ad1-56d8374edd1a"
    models_mount_base: "/mnt/nvme1"
    models_mount: "/mnt/nvme1/models"

  pre_tasks:
    - name: Mount NFS storage from srv6
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/nfs_client.yml"

    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

    - name: Ensure NVMe mount point exists
      ansible.builtin.file:
        path: "{{ models_mount_base }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Mount NVMe partition by UUID
      ansible.posix.mount:
        path: "{{ models_mount_base }}"
        src: "UUID={{ models_uuid }}"
        fstype: ext4
        opts: defaults,nofail
        state: mounted

    - name: Ensure models subdirectory exists on NVMe partition
      ansible.builtin.file:
        path: "{{ models_mount }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Ensure shared Docker network exists
      community.docker.docker_network:
        name: "{{ docker_network }}"
        state: present

    - name: Install NVIDIA Container Toolkit
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/nvidia_toolkit.yml"

  tasks:
    - name: Deploy ollama stack
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/deploy_stack.yml"
      vars:
        stack_name: ollama
