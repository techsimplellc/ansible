---
# =============================================================================
# tufw.yml — Install tufw (terminal UI for UFW) on all homelab servers
# Docs: https://github.com/peltho/tufw
#
# No vault vars required.
#
# Run:
#   ansible-playbook playbooks/tufw.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Install tufw on all homelab servers
  hosts: farm:dev
  become: true
  gather_facts: true

  vars_files:
    - vars/app_versions.yml

  vars:
    tufw_deb_url: "https://github.com/peltho/tufw/releases/download/v{{ tufw_version }}/tufw_{{ tufw_version }}_linux_amd64.deb"
    tufw_deb_dest: "/tmp/tufw_{{ tufw_version }}_linux_amd64.deb"

  tasks:
    - name: Check installed tufw version
      ansible.builtin.command: tufw --version
      register: tufw_installed
      changed_when: false
      failed_when: false

    - name: Download tufw .deb
      ansible.builtin.get_url:
        url: "{{ tufw_deb_url }}"
        dest: "{{ tufw_deb_dest }}"
        mode: "0644"
      when: tufw_installed.rc != 0 or tufw_version not in tufw_installed.stdout

    - name: Install tufw .deb
      ansible.builtin.apt:
        deb: "{{ tufw_deb_dest }}"
        state: present
      when: tufw_installed.rc != 0 or tufw_version not in tufw_installed.stdout

    - name: Remove downloaded .deb
      ansible.builtin.file:
        path: "{{ tufw_deb_dest }}"
        state: absent
      when: tufw_installed.rc != 0 or tufw_version not in tufw_installed.stdout
