---
# =============================================================================
# yt-dlp-gui.yml — Deploy yt-dlp-gui stack to srv3
# Docs: https://github.com/dsymbol/yt-dlp-gui
#
# No published Docker image — source is pushed from the Ansible controller
# (~/git/yt-dlp-gui on the Mac) to a local disk path on srv3 and built there.
#
# Source dir:  /opt/ytdlpgui-src      (local disk on srv3, build context)
# Stack dir:   /opt/stacks/ytdlpgui  (NFS, persistent downloads + config)
#
# Build uses DOCKER_BUILDKIT=0 (classic builder). BuildKit bake pipes the
# compose config via stdin, losing the filesystem anchor needed to resolve
# the Dockerfile path. The classic builder resolves it from chdir correctly.
#
# Subnet restriction: port 6080 is bound to 192.168.68.13 only.
# Not exposed externally — do NOT add to Cloudflare tunnel or NPM.
#
# Vault: playbooks/vars/ytdlpgui_vault.yml
#   ytdlpgui_vnc_password : VNC session password (leave blank to disable auth)
#
# Run:
#   ansible-playbook playbooks/yt-dlp-gui.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- name: Deploy yt-dlp-gui stack to srv3
  hosts: srv3
  become: true
  gather_facts: true

  vars_files:
    - vars/app_versions.yml
    - vars/ytdlpgui_vault.yml

  vars:
    stacks_root: /opt/stacks
    stack_name: ytdlpgui
    src_dir: /opt/ytdlpgui-src

  pre_tasks:
    - name: Mount NFS storage from srv6
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/nfs_client.yml"

    - name: Enforce /opt/stacks ownership
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/stacks_owner.yml"

  tasks:
    - name: Push yt-dlp-gui source from controller to srv3 local disk
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/git/yt-dlp-gui/"
        dest: "{{ src_dir }}/"
        owner: root
        group: root
        mode: preserve
        directory_mode: "0755"
      register: source_copy

    - name: Create stack runtime directories on NFS
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: docker-admin
        mode: "2775"
      loop:
        - "{{ stacks_root }}/{{ stack_name }}"
        - "{{ stacks_root }}/{{ stack_name }}/downloads"
        - "{{ stacks_root }}/{{ stack_name }}/config"

    - name: Render config.toml
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/{{ stack_name }}/config.toml.j2"
        dest: "{{ stacks_root }}/{{ stack_name }}/config/config.toml"
        owner: root
        group: docker-admin
        mode: "0640"

    - name: Render docker-compose.yml
      ansible.builtin.template:
        src: "{{ playbook_dir }}/templates/{{ stack_name }}/docker-compose.yml.j2"
        dest: "{{ stacks_root }}/{{ stack_name }}/docker-compose.yml"
        owner: root
        group: docker-admin
        mode: "0640"
      register: compose_file

    - name: Build yt-dlp-gui image from source
      ansible.builtin.command:
        cmd: docker compose build
        chdir: "{{ stacks_root }}/{{ stack_name }}"
      environment:
        # BuildKit bake pipes the compose config via stdin, losing the
        # filesystem anchor needed to resolve the Dockerfile path.
        # Classic builder resolves build context from chdir directly.
        DOCKER_BUILDKIT: "0"
      when: source_copy.changed or compose_file.changed
      register: build_result
      changed_when: build_result.rc == 0

    - name: Bring yt-dlp-gui stack up
      ansible.builtin.command:
        cmd: docker compose up --detach --remove-orphans
        chdir: "{{ stacks_root }}/{{ stack_name }}"
      register: up_result
      changed_when: "'Started' in up_result.stdout or 'Created' in up_result.stdout"
