---
# =============================================================================
# srv3_stacks.yml — Orchestrator: deploy all stacks to srv3
# Docs:
#   yt-dlp-gui      : https://github.com/dsymbol/yt-dlp-gui
#   Firefly III     : https://docs.firefly-iii.org/
#   Firefly Importer: https://docs.firefly-iii.org/how-to/data-importer/
#
# This orchestrator imports individual app playbooks. To deploy a single app,
# run its playbook directly (e.g. ansible-playbook playbooks/firefly.yml).
#
# Two-pass note: firefly-importer requires a Firefly III API token.
# Run firefly.yml first, complete setup, then run this orchestrator or
# firefly-importer.yml directly on pass 2.
#
# Vault requirements:
#   playbooks/vars/firefly_vault.yml  — firefly_db_password, firefly_app_key, firefly_importer_token
#
# Run all stacks:
#   ansible-playbook playbooks/srv3_stacks.yml -i inventory.yml --ask-vault-pass --become
# =============================================================================

- import_playbook: yt-dlp-gui.yml
- import_playbook: firefly.yml
- import_playbook: firefly-importer.yml
